<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Purikura Test</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="preview-pane" aria-label="ライブプレビュー">
        <img id="preview" class="preview" src="/api/preview.mjpeg" alt="加工済みカメラプレビュー" />
        <div class="capture-bar">
          <button id="capture-button" class="capture-button" type="button">撮影</button>
          <p id="status" class="status">Ready</p>
        </div>
      </section>

      <aside class="control-pane" aria-label="撮影コントロール">
        <section class="panel">
          <h1>Purikura Test</h1>
          <label>
            Camera
            <select id="camera-select"></select>
          </label>
          <label>
            Processing profile
            <select id="processing-profile">
              <option value="quality">Quality</option>
              <option value="fast">Fast</option>
            </select>
          </label>
        </section>

        <section class="panel">
          <h2>Effects</h2>
          <label>
            Purikura
            <input id="purikura" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Skin
            <input id="skin" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Whitening
            <input id="skin-whitening" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Eye enlarge
            <input id="eye-enlarge" type="range" min="0" max="0.6" step="0.01" />
          </label>
          <label>
            Face slim
            <input id="face-slim" type="range" min="0" max="0.6" step="0.01" />
          </label>
          <label>
            Eye sparkle
            <input id="eye-sparkle" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Lip tint
            <input id="lip-tint" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Blush
            <input id="blush" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Brightness
            <input id="brightness" type="range" min="-80" max="80" step="1" />
          </label>
          <label>
            Contrast
            <input id="contrast" type="range" min="0.5" max="2" step="0.05" />
          </label>
          <label>
            Saturation
            <input id="saturation" type="range" min="0" max="2" step="0.05" />
          </label>
          <h2>Doll Details</h2>
          <label>
            Doll intensity
            <input id="doll-intensity" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Porcelain skin
            <input id="porcelain-skin" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Eye roundness
            <input id="eye-roundness" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Eye liner
            <input id="eye-liner" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Lash emphasis
            <input id="lash-emphasis" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Lower eyelid
            <input id="lower-eyelid" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Iris gloss
            <input id="iris-gloss" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Cheek gradient
            <input id="cheek-gradient" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Lip gloss
            <input id="lip-gloss" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Hair silk
            <input id="hair-silk" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Background high key
            <input id="background-high-key" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Soft glow
            <input id="soft-glow" type="range" min="0" max="1" step="0.05" />
          </label>
          <label>
            Debug overlay
            <select id="debug-overlay">
              <option value="off">Off</option>
              <option value="landmarks">Landmarks</option>
              <option value="masks">Masks</option>
              <option value="parts">Parts</option>
              <option value="all">All</option>
            </select>
          </label>
        </section>

        <section class="panel">
          <h2>Frames</h2>
          <input id="frame-upload" type="file" accept="image/png" />
          <select id="frame-select">
            <option value="">No frame</option>
          </select>
        </section>

        <section class="panel history-panel">
          <h2>Captures</h2>
          <div id="captures" class="captures"></div>
        </section>
      </aside>
    </main>
    <script src="/static/app.js" type="module"></script>
  </body>
</html>
