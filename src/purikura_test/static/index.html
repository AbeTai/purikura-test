<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Purikura Test</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="preview-pane" aria-label="ライブプレビュー">
        <img id="preview" class="preview" src="/api/preview.mjpeg" alt="加工済みカメラプレビュー" />
        <div class="capture-bar">
          <button id="capture-button" class="capture-button" type="button">撮影</button>
          <p id="status" class="status">Ready</p>
        </div>
      </section>

      <aside class="control-pane" aria-label="撮影コントロール">
        <section class="panel">
          <h1>Purikura Test</h1>
          <label>
            Camera
            <select id="camera-select"></select>
          </label>
          <label>
            Processing profile
            <select id="processing-profile">
              <option value="quality">Quality</option>
              <option value="fast">Fast</option>
            </select>
          </label>
        </section>

        <section class="panel">
          <h2>Effects</h2>
          <p class="panel-description">
            基本はPurikuraとDoll styleを調整してください。細かい美白、チーク、リップ、アイライン、涙袋、グローは内部で自動配分されます。
          </p>
          <label>
            Purikura strength
            <input id="purikura" type="range" min="0" max="1" step="0.05" />
            <span class="control-help">全体の明るさ、美白、ピンク寄せ、プリクラらしいトーンをまとめて強めます。</span>
          </label>
          <label>
            Skin smoothing
            <input id="skin" type="range" min="0" max="1" step="0.05" />
            <span class="control-help">顔、首、手などの肌領域をなめらかにします。目、眉、唇は保護されます。</span>
          </label>
          <label>
            Eye enlarge
            <input id="eye-enlarge" type="range" min="0" max="0.6" step="0.01" />
            <span class="control-help">目周辺を局所変形して大きく見せます。Doll styleと合わせると丸い目になります。</span>
          </label>
          <label>
            Face slim
            <input id="face-slim" type="range" min="0" max="0.6" step="0.01" />
            <span class="control-help">頬下と顎を内側へ寄せて、Vライン寄りの小顔にします。</span>
          </label>
          <label>
            Doll style
            <input id="doll-intensity" type="range" min="0" max="1" step="0.05" />
            <span class="control-help">陶器肌、丸い目、アイライン、まつ毛、涙袋、瞳グロス、チーク、リップ、髪のなめらかさ、ソフトグローをまとめて調整します。</span>
          </label>
          <label>
            Background
            <input id="background-high-key" type="range" min="0" max="1" step="0.05" />
            <span class="control-help">背景マスクだけを白/薄ピンクへ寄せ、スタジオ風の高キー背景にします。</span>
          </label>
          <label>
            Debug overlay
            <select id="debug-overlay">
              <option value="off">Off</option>
              <option value="landmarks">Landmarks</option>
              <option value="masks">Masks</option>
              <option value="parts">Parts</option>
              <option value="all">All</option>
            </select>
            <span class="control-help">顔ランドマーク、肌/髪/背景マスク、鼻や頬などの部位領域を確認できます。</span>
          </label>
        </section>

        <section class="panel">
          <h2>Frames</h2>
          <input id="frame-upload" type="file" accept="image/png" />
          <select id="frame-select">
            <option value="">No frame</option>
          </select>
        </section>

        <section class="panel history-panel">
          <h2>Captures</h2>
          <div id="captures" class="captures"></div>
        </section>
      </aside>
    </main>
    <script src="/static/app.js" type="module"></script>
  </body>
</html>
